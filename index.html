<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS Ops</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="logo">JARVIS <span class="logo-dim">Ops</span></span>
    </div>
    <div class="top-bar-right">
      <span id="last-updated" class="meta-text"></span>
      <span id="health-pill" class="pill"></span>
      <a id="repo-link" class="meta-link" target="_blank" rel="noopener">GitHub</a>
    </div>
  </header>

  <div id="health-banner" class="health-banner" style="display:none"></div>

  <main id="dashboard" class="grid">
    <div class="loading-state">Loading state&hellip;</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
